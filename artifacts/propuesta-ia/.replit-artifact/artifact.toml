kind = "web"
previewPath = "/"
title = "Propuesta Comercial IA"
version = "1.0.0"
id = "artifacts/propuesta-ia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21995

[services.development]
run = "pnpm --filter @workspace/propuesta-ia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/propuesta-ia", "run", "build" ]
publicDir = "artifacts/propuesta-ia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21995"
BASE_PATH = "/"
